<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendo Matemáticas!</title>
    <style>
        body {
            background-color: #1a1a2e;
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container-box {
            background-color: #16213e;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: #4ecca3; margin-top: 0; }

        .stats-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #score { font-size: 1.2rem; font-weight: bold; color: #e94560; }

        #rewards { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; font-size: 1.5rem; min-height: 35px; }

        #question { font-size: 3.5rem; font-weight: 800; color: #ffffff; margin-bottom: 20px; }

        /* Esta sección ahora está oculta al establecer display: none */
        #visual-aid {
            display: none;
        }

        .circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            margin: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px;
            border: 4px solid;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover { transform: scale(1.05); }

        #btn0 { background-color: #0f3460; border-color: #4ecca3; color: #ffffff; }
        #btn1 { background-color: #0f3460; border-color: #4ecca3; color: #ffffff; }
        #btn2 { background-color: #0f3460; border-color: #4ecca3; color: #ffffff; }
        #btn3 { background-color: #0f3460; border-color: #4ecca3; color: #ffffff; }
    </style>
</head>
<body>

    <div class="container-box">
        <h1>¡A Jugar!</h1>
        
        <div class="stats-area">
            <div id="score">Puntos: 0</div>
            <div id="rewards" title="Tus premios"></div>
        </div>

        <div id="question">? + ?</div>

        <!-- El contenedor visual ahora está oculto mediante CSS -->
        <div id="visual-aid"></div>

        <div class="grid">
            <button onclick="checkAnswer(0)" id="btn0">?</button>
            <button onclick="checkAnswer(1)" id="btn1">?</button>
            <button onclick="checkAnswer(2)" id="btn2">?</button>
            <button onclick="checkAnswer(3)" id="btn3">?</button>
        </div>
    </div>

    <script>
        let correctIndex;
        let points = 0;
        const rewards = ["⭐", "🍬", "🍭", "🍫", "🧸", "🎈", "🍪", "🍦"];

        /* // Esta función ha sido comentada para que no se ejecute.
        // Se encargaba de renderizar los círculos de apoyo visual.
        function renderVisuals(a, b, isAddition) {
            const container = document.getElementById('visual-aid');
            container.innerHTML = '';
            for(let i=0; i<a; i++) {
                container.innerHTML += `<div class="circle" style="background-color: #4ecca3;"></div>`;
            }
            container.innerHTML += `<span style="margin: 0 10px; font-weight: bold; color: #ffffff;">${isAddition ? '+' : '-'}</span>`;
            for(let i=0; i<b; i++) {
                container.innerHTML += `<div class="circle" style="background-color: #e94560;"></div>`;
            }
        }
        */

        function generateQuestion() {
            const isAddition = Math.random() > 0.5;
            let a, b, answer;

            if (isAddition) {
                a = Math.floor(Math.random() * 9) + 1;
                b = Math.floor(Math.random() * 9) + 1;
                answer = a + b;
                document.getElementById('question').innerText = `${a} + ${b}`;
            } else {
                a = Math.floor(Math.random() * 9) + 5;
                b = Math.floor(Math.random() * a);
                answer = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }

            // renderVisuals(a, b, isAddition); // Llamada comentada para desactivar la visualización

            const options = [answer];
            while (options.length < 4) {
                let fake = Math.floor(Math.random() * 20);
                if (!options.includes(fake)) options.push(fake);
            }

            options.sort(() => Math.random() - 0.5);
            correctIndex = options.indexOf(answer);

            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).innerText = options[i];
            }
        }

        function checkAnswer(index) {
            const rewardContainer = document.getElementById('rewards');
            
            if (index === correctIndex) {
                points += 10;
                const rewardIdx = (Math.floor(points / 10) - 1) % rewards.length;
                rewardContainer.innerHTML += `<span>${rewards[rewardIdx]}</span>`;
                generateQuestion();
            } else {
                if (points >= 10) {
                    points -= 10;
                    if(rewardContainer.lastChild) rewardContainer.removeChild(rewardContainer.lastChild);
                }
                document.body.style.backgroundColor = "#533434";
                setTimeout(() => document.body.style.backgroundColor = "#1a1a2e", 200);
            }
            document.getElementById('score').innerText = `Puntos: ${points}`;
        }

        generateQuestion();
    </script>
</body>
</html>
