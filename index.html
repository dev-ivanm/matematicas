<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendo Matemáticas!</title>
    <style>
        body {
            background-color: #f0f9ff;
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container-box {
            background-color: white;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: #4f46e5; margin-top: 0; }

        .stats-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #score { font-size: 1.2rem; font-weight: bold; color: #4b5563; }

        #rewards { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; font-size: 1.5rem; min-height: 35px; }

        #question { font-size: 3.5rem; font-weight: 800; color: #1f2937; margin-bottom: 20px; }

        #visual-aid {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            margin-bottom: 20px;
        }

        .circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            margin: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px;
            border: 4px solid;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover { transform: scale(1.05); }

        #btn0 { background-color: #dbeafe; border-color: #bfdbfe; color: #1e40af; }
        #btn1 { background-color: #dcfce7; border-color: #bbf7d0; color: #166534; }
        #btn2 { background-color: #fef9c3; border-color: #fef08a; color: #854d0e; }
        #btn3 { background-color: #fce7f3; border-color: #fbcfe8; color: #9d174d; }
    </style>
</head>
<body>

    <div class="container-box">
        <h1>¡A Jugar!</h1>
        
        <div class="stats-area">
            <div id="score">Puntos: 0</div>
            <div id="rewards" title="Tus premios"></div>
        </div>

        <div id="question">? + ?</div>

        <div id="visual-aid"></div>

        <div class="grid">
            <button onclick="checkAnswer(0)" id="btn0">?</button>
            <button onclick="checkAnswer(1)" id="btn1">?</button>
            <button onclick="checkAnswer(2)" id="btn2">?</button>
            <button onclick="checkAnswer(3)" id="btn3">?</button>
        </div>
    </div>

    <script>
        let correctIndex;
        let points = 0;
        const rewards = ["⭐", "🍬", "🍭", "🍫", "🧸", "🎈", "🍪", "🍦"];

        function renderVisuals(a, b, isAddition) {
            const container = document.getElementById('visual-aid');
            container.innerHTML = '';
            
            for(let i=0; i<a; i++) {
                container.innerHTML += `<div class="circle" style="background-color: #60a5fa;"></div>`;
            }
            container.innerHTML += `<span style="margin: 0 10px; font-weight: bold; color: #9ca3af;">${isAddition ? '+' : '-'}</span>`;
            for(let i=0; i<b; i++) {
                container.innerHTML += `<div class="circle" style="background-color: #f472b6;"></div>`;
            }
        }

        function generateQuestion() {
            const isAddition = Math.random() > 0.5;
            let a, b, answer;

            if (isAddition) {
                a = Math.floor(Math.random() * 9) + 1;
                b = Math.floor(Math.random() * 9) + 1;
                answer = a + b;
                document.getElementById('question').innerText = `${a} + ${b}`;
            } else {
                a = Math.floor(Math.random() * 9) + 5;
                b = Math.floor(Math.random() * a);
                answer = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }

            renderVisuals(a, b, isAddition);

            const options = [answer];
            while (options.length < 4) {
                let fake = Math.floor(Math.random() * 20);
                if (!options.includes(fake)) options.push(fake);
            }

            options.sort(() => Math.random() - 0.5);
            correctIndex = options.indexOf(answer);

            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).innerText = options[i];
            }
        }

        function checkAnswer(index) {
            const rewardContainer = document.getElementById('rewards');
            
            if (index === correctIndex) {
                points += 10;
                const rewardIdx = (Math.floor(points / 10) - 1) % rewards.length;
                rewardContainer.innerHTML += `<span>${rewards[rewardIdx]}</span>`;
                generateQuestion();
            } else {
                if (points >= 10) {
                    points -= 10;
                    if(rewardContainer.lastChild) rewardContainer.removeChild(rewardContainer.lastChild);
                }
                document.body.style.backgroundColor = "#fee2e2";
                setTimeout(() => document.body.style.backgroundColor = "#f0f9ff", 200);
            }
            document.getElementById('score').innerText = `Puntos: ${points}`;
        }

        generateQuestion();
    </script>
</body>
</html>
