<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendo Matemáticas!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
        }
        .game-card {
            transition: transform 0.2s, background-color 0.2s;
        }
        .game-card:hover {
            transform: scale(1.05);
            background-color: #fef3c7;
        }
        .circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            margin: 2px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-lg w-full bg-white rounded-3xl p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-bold text-indigo-600 mb-4">¡A Jugar!</h1>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-6 mb-8">
            <div id="score" class="text-xl font-semibold text-gray-600">Puntos: 0</div>
            <div id="rewards" class="flex flex-wrap justify-center gap-2 text-2xl" title="Tus premios"></div>
        </div>

        <div id="question" class="text-6xl font-extrabold text-gray-800 mb-4 py-4">
            ? + ?
        </div>

        <div id="visual-aid" class="mb-8 p-4 bg-gray-50 rounded-2xl flex flex-wrap justify-center items-center min-h-[100px]">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="checkAnswer(0)" id="btn0" class="game-card p-6 bg-blue-100 text-blue-800 text-2xl font-bold rounded-2xl border-4 border-blue-200">?</button>
            <button onclick="checkAnswer(1)" id="btn1" class="game-card p-6 bg-green-100 text-green-800 text-2xl font-bold rounded-2xl border-4 border-green-200">?</button>
            <button onclick="checkAnswer(2)" id="btn2" class="game-card p-6 bg-yellow-100 text-yellow-800 text-2xl font-bold rounded-2xl border-4 border-yellow-200">?</button>
            <button onclick="checkAnswer(3)" id="btn3" class="game-card p-6 bg-pink-100 text-pink-800 text-2xl font-bold rounded-2xl border-4 border-pink-200">?</button>
        </div>
    </div>

    <script>
        let correctIndex;
        let points = 0;
        const rewards = ["⭐", "🍬", "🍭", "🍫", "🧸", "🎈", "🍪", "🍦"];

        function renderVisuals(a, b, isAddition) {
            const container = document.getElementById('visual-aid');
            container.innerHTML = '';
            
            for(let i=0; i<a; i++) {
                container.innerHTML += `<div class="circle bg-blue-400"></div>`;
            }
            container.innerHTML += `<span class="text-2xl font-bold mx-4 text-gray-400">${isAddition ? '+' : '-'}</span>`;
            for(let i=0; i<b; i++) {
                container.innerHTML += `<div class="circle bg-pink-400"></div>`;
            }
        }

        function generateQuestion() {
            const isAddition = Math.random() > 0.5;
            let a, b, answer;

            if (isAddition) {
                a = Math.floor(Math.random() * 9) + 1;
                b = Math.floor(Math.random() * 9) + 1;
                answer = a + b;
                document.getElementById('question').innerText = `${a} + ${b}`;
            } else {
                a = Math.floor(Math.random() * 9) + 5;
                b = Math.floor(Math.random() * a);
                answer = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }

            renderVisuals(a, b, isAddition);

            const options = [answer];
            while (options.length < 4) {
                let fake = Math.floor(Math.random() * 20);
                if (!options.includes(fake)) options.push(fake);
            }

            options.sort(() => Math.random() - 0.5);
            correctIndex = options.indexOf(answer);

            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).innerText = options[i];
            }
        }

        function checkAnswer(index) {
            const rewardContainer = document.getElementById('rewards');
            
            if (index === correctIndex) {
                points += 10;
                const rewardIdx = (Math.floor(points / 10) - 1) % rewards.length;
                rewardContainer.innerHTML += `<span>${rewards[rewardIdx]}</span>`;
                generateQuestion();
            } else {
                if (points >= 10) {
                    points -= 10;
                    rewardContainer.removeChild(rewardContainer.lastChild);
                }
                document.body.style.backgroundColor = "#fee2e2";
                setTimeout(() => document.body.style.backgroundColor = "#f0f9ff", 200);
            }
            document.getElementById('score').innerText = `Puntos: ${points}`;
        }

        generateQuestion();
    </script>
</body>
</html>
